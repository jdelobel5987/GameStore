  type: Method
  source:
    remote:
      path: GameStore.Api/Data/DataExtensions.cs
      branch: feat/efcore-sqlite
      repo: https://github.com/jdelobel5987/GameStore.git
    id: AddGameStoreDb
    path: ../GameStore.Api/Data/DataExtensions.cs
    startLine: 29
  assemblies:
  - GameStore.Api
  namespace: GameStore.Api.Data
  summary: Registers the GameStoreContext with the dependency injection container using a connection string for a SQLite database. This method defines the connection string for the SQLite database and then registers the GameStoreContext with the specified connection string. Additionally, it includes a seeding mechanism that checks if there are any existing genres in the database, and if not, it adds a predefined list of genres (Fighting, RPG, Platformer, Racing, Sports) to the database. This ensures that when the application is first run, it has some initial data to work with. The method is designed to be called during application startup to set up the database context for the application.
  example: []
  syntax:
    content: public static void AddGameStoreDb(this WebApplicationBuilder builder)
    parameters:
    - id: builder
      type: Microsoft.AspNetCore.Builder.WebApplicationBuilder
      description: The WebApplicationBuilder instance for which to add the database context.
    content.vb: Public Shared Sub AddGameStoreDb(builder As WebApplicationBuilder)
  overload: GameStore.Api.Data.DataExtensions.AddGameStoreDb*
