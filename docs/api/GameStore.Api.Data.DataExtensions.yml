  assemblies:
  - GameStore.Api
  namespace: GameStore.Api.Data
  summary: Applies any pending migrations to the database. This method is typically called during application startup to ensure that the database schema is up to date with the application's data model. It creates a scope to retrieve an instance of GameStoreContext and calls the Migrate method on the database, which applies any pending migrations. If the database does not exist, it will be created automatically. If there are no pending migrations, this method will do nothing. This is a crucial step in ensuring that the application can interact with the database correctly, especially after changes to the data model that require schema updates.
  example: []
  syntax:
    content: public static void MigrateDb(this WebApplication app)
    parameters:
    - id: app
      type: Microsoft.AspNetCore.Builder.WebApplication
      description: The WebApplication instance for which to apply migrations.
    content.vb: Public Shared Sub MigrateDb(app As WebApplication)
  overload: GameStore.Api.Data.DataExtensions.MigrateDb*
- uid: GameStore.Api.Data.DataExtensions.AddGameStoreDb(Microsoft.AspNetCore.Builder.WebApplicationBuilder)
